<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Página não encontrada — NovaCar Studio</title>
  <meta name="robots" content="noindex"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet"/>
  <link rel="icon" href="/favicon.svg" type="image/svg+xml"/>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#0A0A0A;color:#E8E8E8;font-family:'Inter',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .wrap{max-width:480px}
    .gear-404{font-size:6rem;animation:spin-404 8s linear infinite;display:inline-block;margin-bottom:1rem}
    @keyframes spin-404{to{transform:rotate(360deg)}}
    h1{font-size:clamp(4rem,15vw,8rem);font-weight:900;color:#D4A017;line-height:1;letter-spacing:-3px}
    h2{font-size:1.4rem;font-weight:700;margin:0.5rem 0 1rem;color:#fff}
    p{color:#888;font-size:0.95rem;line-height:1.6;margin-bottom:2rem}
    .btn{display:inline-flex;align-items:center;gap:.5rem;padding:.85rem 2rem;border-radius:999px;font-size:.95rem;font-weight:600;text-decoration:none;transition:.3s}
    .btn-gold{background:#D4A017;color:#0A0A0A;border:2px solid #D4A017}
    .btn-gold:hover{background:#F0C040;transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,160,23,.35)}
    .btn-ghost{background:transparent;color:#E8E8E8;border:2px solid rgba(255,255,255,.25);margin-left:.75rem}
    .btn-ghost:hover{border-color:#D4A017;color:#D4A017}
  </style>
</head>
<body>
  <div class="wrap">
    <div class="gear-404">⚙️</div>
    <h1>404</h1>
    <h2>Página não encontrada</h2>
    <p>Parece que essa página foi levada para a oficina e ainda não voltou. Mas não se preocupe — a NovaCar está aqui para te ajudar!</p>
    <div>
      <a href="/" class="btn btn-gold">← Voltar ao início</a>
      <a href="https://wa.me/5514998231408" target="_blank" rel="noopener noreferrer" class="btn btn-ghost">💬 WhatsApp</a>
    </div>
  </div>
</body>
</html>
