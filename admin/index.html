<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — NovaCar Studio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen" class="login-screen" hidden>
  <div class="login-box">
    <div class="login-logo">Nova<span>Car</span> <small>Admin</small></div>
    <p class="login-sub">Painel de controle</p>
    <form id="login-form">
      <label for="login-pwd">Senha de acesso</label>
      <div class="pwd-wrap">
        <input type="password" id="login-pwd" placeholder="••••••••" autocomplete="current-password" required />
        <button type="button" id="pwd-toggle" aria-label="Mostrar senha">👁</button>
      </div>
      <button type="submit" class="btn-primary" id="login-btn">Entrar</button>
      <p id="login-error" class="error-msg" hidden>Senha incorreta.</p>
    </form>
  </div>
</div>

<!-- ═══ DASHBOARD ═══ -->
<div id="dashboard" class="dashboard" hidden>

  <aside class="sidebar">
    <div class="sidebar-logo">Nova<span>Car</span></div>
    <nav class="sidebar-nav" aria-label="Navegação do painel">
      <button class="nav-btn active" data-sec="overview">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
        Dashboard
      </button>
      <button class="nav-btn" data-sec="config">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        Configurações
      </button>
      <button class="nav-btn" data-sec="services">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 000 1.4l1.6 1.6a1 1 0 001.4 0l3.77-3.77a6 6 0 01-7.94 7.94l-6.91 6.91a2.12 2.12 0 01-3-3l6.91-6.91a6 6 0 017.94-7.94l-3.76 3.76z"/></svg>
        Serviços
      </button>
      <button class="nav-btn" data-sec="pricing">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/></svg>
        Preços
      </button>
      <button class="nav-btn" data-sec="testimonials">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
        Depoimentos
      </button>
      <button class="nav-btn" data-sec="faq">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
        FAQ
      </button>
      <button class="nav-btn" data-sec="bookings">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
        Agendamentos
        <span id="booking-badge" class="badge" hidden>0</span>
      </button>
      <button class="nav-btn" data-sec="changePassword">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0110 0v4"/></svg>
        Alterar Senha
      </button>
    </nav>
    <div class="sidebar-footer">
      <div class="session-timer-wrap">
        <span class="session-timer-label">Sessão expira em</span>
        <span id="session-timer" class="session-timer">--:--</span>
      </div>
      <a href="/" target="_blank" class="btn-view-site">Ver site →</a>
      <button id="logout-btn" class="btn-logout">Sair</button>
    </div>
  </aside>

  <main class="main" id="main-content" aria-live="polite">
    <!-- conteúdo injetado via JS -->
  </main>

</div>

<!-- ═══ MODAL ═══ -->
<div id="modal-overlay" class="modal-overlay" hidden role="dialog" aria-modal="true">
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="modal-title">Editar</h3>
      <button id="modal-close" class="modal-close" aria-label="Fechar">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<!-- ═══ TOAST ═══ -->
<div id="toast-container" class="toast-container" aria-live="assertive"></div>

<script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
<script src="app.js"></script>
</body>
</html>
